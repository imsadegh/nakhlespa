# Reference config — apply on VPS at /etc/nginx/sites-available/nakhlespa
# Enable: ln -s /etc/nginx/sites-available/nakhlespa /etc/nginx/sites-enabled/
# Test:   nginx -t && systemctl reload nginx
# ArvanCloud terminates HTTPS at the edge — VPS listens on both 80 and 443 (self-signed cert)

server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name nakhlespa.ir www.nakhlespa.ir;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl default_server;
    listen [::]:443 ssl default_server;
    server_name nakhlespa.ir www.nakhlespa.ir;

    ssl_certificate /etc/ssl/certs/nakhlespa-selfsigned.crt;
    ssl_certificate_key /etc/ssl/private/nakhlespa-selfsigned.key;

    # Proxy Supabase Auth/REST so the browser can reach it via the public domain.
    # NEXT_PUBLIC_SUPABASE_URL must be set to https://nakhlespa.ir (not 127.0.0.1:54321).
    location /supabase/ {
        proxy_pass http://127.0.0.1:54321/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
        proxy_pass http://localhost:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_cache_bypass $http_upgrade;
    }
}
