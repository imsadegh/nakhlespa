# Reference config — apply on VPS at /etc/nginx/sites-available/nakhlespa
# Enable: ln -s /etc/nginx/sites-available/nakhlespa /etc/nginx/sites-enabled/
# Test:   nginx -t && systemctl reload nginx
# SSL:    certbot --nginx -d nakhlespa.ir -d www.nakhlespa.ir

server {
    listen 80;
    server_name nakhlespa.ir www.nakhlespa.ir;

    location / {
        proxy_pass http://localhost:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_cache_bypass $http_upgrade;
    }
}
